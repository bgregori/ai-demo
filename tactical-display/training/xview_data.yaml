  46: 30.0   # Hut/Tent
  47: 10.0   # Shed
  48: 0.3    # Building (VERY common - reduce weight drastically)
  49: 20.0   # Aircraft Hangar
  50: 60.0   # Damaged Building
  51: 5.0    # Facility
