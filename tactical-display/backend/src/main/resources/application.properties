# Mock mode for local testing (set to true to use mock services)
tactical.mock.enabled=false
%dev.tactical.mock.enabled=true

# Model serving
tactical.model.url=http://ai-demo-predictor.demo.svc.cluster.local:80
tactical.model.name=yolo26n-xview
tactical.model.confidence-threshold=0.25
tactical.model.nms-threshold=0.45

# MinIO
tactical.minio.endpoint=http://minio-service.minio.svc.cluster.local:9000
tactical.minio.access-key=minio
tactical.minio.secret-key=minio123
tactical.minio.bucket=demo
tactical.minio.images-prefix=xview-images/

# CORS (for frontend)
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*

# HTTP limits (allow large satellite image uploads)
quarkus.http.limits.max-body-size=50M

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.demo.tactical".level=DEBUG

# Container image
quarkus.container-image.registry=quay.io
quarkus.container-image.group=bgregori
quarkus.container-image.name=tactical-backend
quarkus.container-image.tag=latest
