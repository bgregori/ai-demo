apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: build-tactical-display
  namespace: demo
spec:
  params:
    - name: git-url
      type: string
      description: Git repository URL
      default: https://github.com/bgregori/ai-demo.git

    - name: git-revision
      type: string
      description: Git revision to checkout
      default: main

  workspaces:
    - name: shared-workspace
      description: Shared workspace for source code

  tasks:
    - name: fetch-repository
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: $(params.git-url)
        - name: REVISION
          value: $(params.git-revision)
        - name: DELETE_EXISTING
          value: "true"
      workspaces:
        - name: output
          workspace: shared-workspace

    - name: maven-build-backend
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: maven
          - name: namespace
            value: openshift-pipelines
      runAfter:
        - fetch-repository
      params:
        - name: GOALS
          value:
            - clean
            - package
            - -DskipTests
        - name: SUBDIRECTORY
          value: tactical-display/backend
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: buildah-backend
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      runAfter:
        - maven-build-backend
      params:
        - name: IMAGE
          value: image-registry.openshift-image-registry.svc:5000/demo/tactical-backend:latest
        - name: DOCKERFILE
          value: ./tactical-display/backend/src/main/docker/Dockerfile.jvm
        - name: CONTEXT
          value: ./tactical-display/backend
        - name: TLSVERIFY
          value: "false"
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: buildah-frontend
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      runAfter:
        - fetch-repository
      params:
        - name: IMAGE
          value: image-registry.openshift-image-registry.svc:5000/demo/tactical-frontend:latest
        - name: DOCKERFILE
          value: ./tactical-display/frontend/Dockerfile
        - name: CONTEXT
          value: ./tactical-display/frontend
        - name: TLSVERIFY
          value: "false"
      workspaces:
        - name: source
          workspace: shared-workspace

  finally:
    - name: report-status
      params:
        - name: message
          value: "Pipeline completed. Backend and Frontend images built."
      taskSpec:
        params:
          - name: message
        steps:
          - name: echo
            image: registry.access.redhat.com/ubi9/ubi-minimal:latest
            script: |
              #!/bin/bash
              echo "$(params.message)"
              echo "✓ Backend: image-registry.openshift-image-registry.svc:5000/demo/tactical-backend:latest"
              echo "✓ Frontend: image-registry.openshift-image-registry.svc:5000/demo/tactical-frontend:latest"
