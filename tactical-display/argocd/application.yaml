apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tactical-display
  namespace: openshift-gitops
spec:
  project: default

  source:
    repoURL: https://github.com/bgregori/ai-demo.git
    targetRevision: main
    path: tactical-display/helm/tactical-display
    helm:
      values: |
        # Override default values here if needed
        backend:
          image:
            repository: image-registry.openshift-image-registry.svc:5000/demo/tactical-backend
            tag: latest
          model:
            url: http://ai-demo-predictor-predictor.demo.svc.cluster.local:8080
            name: ai-demo
          minio:
            endpoint: http://minio-service.minio.svc.cluster.local:9000
            accessKey: minio
            secretKey: minio123
            bucket: demo
            prefix: xview-images

        frontend:
          image:
            repository: image-registry.openshift-image-registry.svc:5000/demo/tactical-frontend
            tag: latest
          route:
            host: ""  # Auto-generated by OpenShift

  destination:
    server: https://kubernetes.default.svc
    namespace: demo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Ignore differences in dynamic fields
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: route.openshift.io
      kind: Route
      jsonPointers:
        - /status
