apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tactical-display
  namespace: openshift-gitops
spec:
  project: default

  source:
    repoURL: https://github.com/bgregori/ai-demo.git
    targetRevision: main
    path: tactical-display/helm/tactical-display
    helm:
      values: |
        # Images built by Tekton pipeline
        backend:
          image:
            registry: image-registry.openshift-image-registry.svc:5000
            repository: demo/tactical-backend
            tag: latest

        frontend:
          image:
            registry: image-registry.openshift-image-registry.svc:5000
            repository: demo/tactical-frontend
            tag: latest

  destination:
    server: https://kubernetes.default.svc
    namespace: demo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Ignore differences in dynamic fields
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: route.openshift.io
      kind: Route
      jsonPointers:
        - /status
