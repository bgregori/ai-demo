apiVersion: v1
kind: Service
metadata:
  name: tactical-backend
  labels:
    {{- include "tactical-display.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "tactical-display.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
